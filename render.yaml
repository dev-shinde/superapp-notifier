services:
  - type: worker
    name: superapp-notifier
    env: python
    buildCommand: pip install -r notifier/requirements.txt
    startCommand: python notifier/notifier.py
    schedule: "*/30 * * * *"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: TWILIO_SID
        sync: false
      - key: TWILIO_TOKEN
        sync: false
      - key: TWILIO_FROM
        sync: false
      - key: TWILIO_TO
        sync: false
